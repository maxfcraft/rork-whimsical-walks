<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap');

*, *::before, *::after { box-sizing: border-box; }
body { margin: 0; padding: 0; background: #000; }
</style>
</head>
<body>
<div style="position:relative; width:1284px; height:2778px; overflow:hidden;">

  <!-- Background -->
  <img
    src="https://r2-pub.rork.com/app-store-screenshots/7c873443-9eb8-4b56-ac51-d2b1b2ef0bb5.png"
    draggable="false"
    style="position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; object-position:center; display:block; z-index:0;"
  />

  <!-- Subtle scrim to boost headline contrast in the upper region -->
  <div style="position:absolute; top:0; left:0; width:100%; height:28%; background:linear-gradient(to bottom, rgba(240,230,255,0.55) 0%, rgba(240,230,255,0.18) 80%, rgba(240,230,255,0) 100%); z-index:1;"></div>

  <!-- Headline -->
  <div style="position:absolute; top:0; left:50%; width:80%; height:26%; transform:translateX(-50%); display:flex; align-items:center; justify-content:center; text-align:center; z-index:2;">
    <h1 style="
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800;
      font-size: 120px;
      line-height: 1.1;
      color: #1C1040;
      text-shadow:
        0 2px 0 rgba(255,255,255,0.6),
        0 4px 24px rgba(194,168,224,0.35);
      letter-spacing: -1px;
    ">Daily Quests</h1>
  </div>

  <!-- Device Mockup -->
  <div style="position:absolute; left:50%; bottom:0; width:86%; transform:translateX(-50%) translateY(6%); z-index:3;">
    <div style="position:relative; aspect-ratio:879/1832;">
      <div style="position:absolute; overflow:hidden; left:4.32%; top:2.29%; width:91.47%; height:95.41%; border-radius:7.5% / 3.5%;">
        <img src="https://r2-pub.rork.com/app-store-screenshots/captures/iphone/02_quests.png" style="display:block; width:100%; height:100%; object-fit:cover; object-position:top;" draggable="false" />
      </div>
      <img src="https://r2-pub.rork.com/static/iphone-mockups/iphone-17-pro-cosmic-orange.png" style="position:relative; z-index:10; display:block; width:100%; height:100%; pointer-events:none;" draggable="false" />
    </div>
  </div>

</div>
</body>
</html>
